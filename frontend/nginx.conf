server {
    listen 80;
    server_name localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── SPA fallback — serve index.html for any route ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse-proxy API calls to the FastAPI backend container ─────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Large file uploads — match backend's 100 MB limit
        client_max_body_size 100M;
    }

    # ── Proxy media file requests to backend ─────────────────────────────
    location /media/ {
        proxy_pass         http://backend:8000/media/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── Gzip for performance ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
